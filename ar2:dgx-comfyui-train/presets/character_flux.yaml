---
# character_flux.yaml — ar2:dgx-comfyui-train v1 preset
# Mirror of DGX-verified /root/lora_training/Dr_Eilin/config.yaml.
# Placeholders {{NAME}}, {{TAG}}, {{TRAINING_FOLDER}}, {{DATASET_FOLDER}}
# are substituted by scripts/trainer.py at runtime.
job: extension
config:
  name: "{{NAME}}"
  process:
    - type: "sd_trainer"
      training_folder: "{{TRAINING_FOLDER}}"
      device: cuda:0
      trigger_word: "{{TAG}}"

      network:
        type: "lora"
        linear: 32
        linear_alpha: 32

      save:
        dtype: float16
        save_every: 500
        max_step_saves_to_keep: 2
        push_to_hub: false

      datasets:
        - folder_path: "{{DATASET_FOLDER}}"
          caption_ext: "txt"
          caption_dropout_rate: 0.05
          shuffle_tokens: false
          cache_latents_to_disk: true
          resolution: [512, 768]

      train:
        batch_size: 1
        steps: 1500
        gradient_accumulation_steps: 1
        train_unet: true
        train_text_encoder: false
        gradient_checkpointing: true
        noise_scheduler: "flowmatch"
        optimizer: "adamw8bit"
        lr: 1.0e-4
        ema_config:
          use_ema: true
          ema_decay: 0.99
        dtype: bf16

      model:
        name_or_path: "/root/flux-dev"
        is_flux: true
        quantize: true

      sample:
        sampler: "flowmatch"
        sample_every: 500
        width: 768
        height: 768
        prompts:
          - "{{TAG}}, front portrait, soft lighting, anime style, high quality illustration"
          - "{{TAG}}, three-quarter view, confident pose, anime style"
          - "{{TAG}}, full body standing, anime style, vibrant colors"
        neg: ""
        seed: 42
        walk_seed: true
        guidance_scale: 3.5
        sample_steps: 20

meta:
  name: "{{NAME}}"
  version: "1.0"
